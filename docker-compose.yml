services:
  coordinator:
    build: .
    command: ["com.example.distributedstorage.coordinator.CoordinatorMain", "--port", "50051", "--nodes", "node-1:50061,node-2:50062,node-3:50063", "--replicas", "2"]
    ports:
      - "50051:50051"
    depends_on:
      - node-1
      - node-2
      - node-3

  node-1:
    build: .
    command: ["com.example.distributedstorage.node.StorageNodeMain", "--port", "50061", "--data-dir", "/data"]
    volumes:
      - node-1-data:/data

  node-2:
    build: .
    command: ["com.example.distributedstorage.node.StorageNodeMain", "--port", "50062", "--data-dir", "/data"]
    volumes:
      - node-2-data:/data

  node-3:
    build: .
    command: ["com.example.distributedstorage.node.StorageNodeMain", "--port", "50063", "--data-dir", "/data"]
    volumes:
      - node-3-data:/data

volumes:
  node-1-data:
  node-2-data:
  node-3-data:

