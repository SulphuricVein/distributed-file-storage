syntax = "proto3";

package distributedstorage;

option java_multiple_files = true;
option java_package = "com.example.distributedstorage.proto";
option java_outer_classname = "DistributedStorageProto";

service StorageNode {
  rpc StoreChunk(Chunk) returns (StoreChunkResponse);
  rpc GetChunk(ChunkRequest) returns (ChunkResponse);
  rpc Health(HealthRequest) returns (HealthResponse);
}

service Coordinator {
  rpc StoreChunk(Chunk) returns (StoreChunkResponse);
  rpc DownloadFile(DownloadRequest) returns (stream Chunk);
  rpc ListFiles(ListFilesRequest) returns (ListFilesResponse);
}

message Chunk {
  string file_name = 1;
  int32 chunk_index = 2;
  bytes data = 3;
}

message ChunkRequest {
  string file_name = 1;
  int32 chunk_index = 2;
}

message ChunkResponse {
  bool found = 1;
  bytes data = 2;
  string message = 3;
}

message StoreChunkResponse {
  bool success = 1;
  string message = 2;
}

message HealthRequest {}

message HealthResponse {
  bool healthy = 1;
  string node_id = 2;
}

message DownloadRequest {
  string file_name = 1;
}

message ListFilesRequest {}

message ListFilesResponse {
  repeated string file_names = 1;
}

